<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Definitions for gradients and glows -->
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9E00" />
      <stop offset="100%" stop-color="#FF3C00" />
    </linearGradient>
    <linearGradient id="greyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2D2D3A" />
      <stop offset="100%" stop-color="#15151E" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Shield -->
  <polygon points="100,10 180,45 165,155 100,195 35,155 20,45" fill="url(#greyGrad)" stroke="#FF5C00" stroke-width="4" />
  <polygon points="100,20 170,50 155,145 100,180 45,145 30,50" fill="#0A0A10" opacity="0.8" />

  <!-- Symmetrical Gaming-Style Wolf Head -->
  <!-- Left Ear -->
  <polygon points="50,90 35,35 80,70" fill="#FF5C00" />
  <polygon points="55,85 42,42 75,70" fill="#FF9E00" />

  <!-- Right Ear -->
  <polygon points="150,90 165,35 120,70" fill="#FF5C00" />
  <polygon points="145,85 158,42 125,70" fill="#FF9E00" />

  <!-- Forehead / Brow -->
  <polygon points="100,60 70,80 100,95" fill="#FF9E00" />
  <polygon points="100,60 130,80 100,95" fill="#FF5C00" />
  
  <polygon points="70,80 50,90 75,100" fill="#FF3C00" />
  <polygon points="130,80 150,90 125,100" fill="#FF3C00" />

  <!-- Eyes Background / Shadows -->
  <polygon points="75,100 100,95 100,115 85,120" fill="#15151E" />
  <polygon points="125,100 100,95 100,115 115,120" fill="#1C1C24" />

  <!-- Glowing Esports Eyes -->
  <!-- Left Eye -->
  <polygon points="73,95 87,97 81,103" fill="#FFFFFF" filter="url(#glow)" />
  <polygon points="71,94 89,96 81,105" fill="#FF9E00" />
  
  <!-- Right Eye -->
  <polygon points="127,95 113,97 119,103" fill="#FFFFFF" filter="url(#glow)" />
  <polygon points="129,94 111,96 119,105" fill="#FF9E00" />

  <!-- Cheeks -->
  <polygon points="50,90 75,100 55,130" fill="#2D2D3A" />
  <polygon points="150,90 125,100 145,130" fill="#2D2D3A" />
  
  <polygon points="55,130 75,100 85,120 70,145" fill="#1E1E28" />
  <polygon points="145,130 125,100 115,120 130,145" fill="#1E1E28" />

  <!-- Snout / Muzzle -->
  <polygon points="100,95 85,120 100,135" fill="#FFFFFF" />
  <polygon points="100,95 115,120 100,135" fill="#E2E2E9" />
  
  <polygon points="85,120 100,150 100,135" fill="#2D2D3A" />
  <polygon points="115,120 100,150 100,135" fill="#1E1E28" />

  <!-- Nose -->
  <polygon points="100,150 92,158 100,165" fill="#FF5C00" />
  <polygon points="100,150 108,158 100,165" fill="#FF3C00" />

  <!-- Aggressive Lower Jaw / Mane details -->
  <polygon points="40,95 50,110 35,115" fill="#FF5C00" />
  <polygon points="160,95 150,110 165,115" fill="#FF5C00" />

  <polygon points="35,115 55,130 30,135" fill="#FF3C00" />
  <polygon points="165,115 145,130 170,135" fill="#FF3C00" />

  <polygon points="30,135 70,145 100,180 70,165 50,155" fill="#FF5C00" />
  <polygon points="170,135 130,145 100,180 130,165 150,155" fill="#FF5C00" />
</svg>
